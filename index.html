<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Thiệp mời lễ tốt nghiệp - Nguyễn Thị Tường Vy | Đại học Ngoại ngữ - Đại học Đà Nẵng" />
  <meta name="theme-color" content="#6e1420" />
  <title>Graduation Ceremony · Nguyễn Thị Tường Vy</title>

  <!-- Open Graph -->
  <meta property="og:title" content="Graduation Ceremony · Nguyễn Thị Tường Vy" />
  <meta property="og:description" content="Hy vọng trong bức tranh thanh xuân của tớ sẽ có sự góp mặt của cậu." />
  <meta property="og:type" content="website" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,500&family=Montserrat:wght@300;400;500;600&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Background audio (muted by default; user supplies assets-1/music.mp3) -->
  <audio id="bgAudio" loop preload="none" muted>
    <source src="assets-1/music.mp3" type="audio/mpeg" />
  </audio>

  <main class="stage">
    <article class="card" id="invite">
      <!-- ============ VELVET RIBBONS ============ -->
      <div class="banner banner--left" aria-hidden="true">
        <div class="banner__header"></div>
        <svg class="banner__laurel" viewBox="0 0 40 30" width="30" height="22" aria-hidden="true">
          <g fill="none" stroke="#e6c877" stroke-width="1.4" stroke-linecap="round">
            <path d="M20 27 C13 22 9 15 9 6" />
            <path d="M20 27 C27 22 31 15 31 6" />
            <path d="M11 10 q-5 -1 -6 -5 q4 0 6 3 M13 15 q-5 -1 -6 -5 q4 0 6 3 M15 20 q-5 -1 -6 -5 q4 0 6 3" />
            <path d="M29 10 q5 -1 6 -5 q-4 0 -6 3 M27 15 q5 -1 6 -5 q-4 0 -6 3 M25 20 q5 -1 6 -5 q-4 0 -6 3" />
          </g>
          <circle cx="20" cy="5" r="2.4" fill="#e6c877" />
        </svg>
        <div class="banner__inner">
          <span class="banner__spacer"></span>
          <span class="banner__title">U F L S</span>
          <span class="banner__spacer"></span>
          <span class="banner__years">K22</span>
        </div>
      </div>

      <div class="banner banner--right" aria-hidden="true">
        <div class="banner__header"></div>
        <svg class="banner__laurel" viewBox="0 0 40 30" width="30" height="22" aria-hidden="true">
          <g fill="none" stroke="#e6c877" stroke-width="1.4" stroke-linecap="round">
            <path d="M20 27 C13 22 9 15 9 6" />
            <path d="M20 27 C27 22 31 15 31 6" />
            <path d="M11 10 q-5 -1 -6 -5 q4 0 6 3 M13 15 q-5 -1 -6 -5 q4 0 6 3 M15 20 q-5 -1 -6 -5 q4 0 6 3" />
            <path d="M29 10 q5 -1 6 -5 q-4 0 -6 3 M27 15 q5 -1 6 -5 q-4 0 -6 3 M25 20 q5 -1 6 -5 q-4 0 -6 3" />
          </g>
          <circle cx="20" cy="5" r="2.4" fill="#e6c877" />
        </svg>
        <div class="banner__inner">
        <!-- <span class="banner__script">Nguyễn Thị Tường Vy</span> -->
          <span class="banner__spacer"></span>
          <span class="banner__code">Faculty of International Studies</span>
          <!-- <span class="banner__dept">Faculty of International Studies</span> -->
        </div>
      </div>

      <!-- ============ HEADER / LOGO ============ -->
      <header class="masthead">
        <div class="logo">
          <img
            src="assets-1/logo.jpg"
            alt="Logo Đại học Ngoại ngữ - Đại học Đà Nẵng"
            class="logo__img logo__img--gold"
            width="54"
            height="54"
            onerror="this.style.display='none';this.nextElementSibling.style.display='block';"
          />
          <!-- SVG fallback (shown only if assets-1/logo.png is missing) -->
          <svg class="logo__fallback" viewBox="0 0 64 64" width="52" height="52" role="img" aria-label="Logo ĐHNN" style="display:none;">
            <g fill="none" stroke="#1a2f7a" stroke-width="3" stroke-linecap="round">
              <path d="M34 6 a26 26 0 0 1 0 52" />
              <path d="M34 12 a20 20 0 0 1 0 40" />
              <path d="M34 18 a14 14 0 0 1 0 28" />
            </g>
            <rect x="33" y="4" width="3" height="56" fill="#1a2f7a" />
            <text x="4" y="26" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#1a2f7a">ĐHNN</text>
            <g transform="translate(24 34)">
              <circle cx="12" cy="12" r="12" fill="none" stroke="#e02020" stroke-width="1.6" />
              <ellipse cx="12" cy="12" rx="5" ry="12" fill="none" stroke="#e02020" stroke-width="1.2" />
              <line x1="0" y1="12" x2="24" y2="12" stroke="#e02020" stroke-width="1.2" />
              <line x1="2" y1="6" x2="22" y2="6" stroke="#e02020" stroke-width="1.2" />
              <line x1="2" y1="18" x2="22" y2="18" stroke="#e02020" stroke-width="1.2" />
              <path d="M7 9 h4 l1 3 -2 2 3 1 v2 h-3 l-2 -3 -2 1 z" fill="#1a2f7a" />
            </g>
          </svg>
        </div>
        <!-- <p class="masthead__uni">UNIVERSITY OF FOREIGN LANGUAGES<br /><span>UNIVERSITY OF DANANG</span></p> -->
      </header>

      <!-- ============ TITLE ============ -->
      <section class="title-block">
        <h1 class="title">
          <span class="title__cap" aria-hidden="true">
            <svg viewBox="0 0 64 40" width="34" height="24" role="img" aria-label="graduation cap">
              <path d="M32 4 L62 15 L32 26 L2 15 Z" fill="#7a1622" />
              <path d="M14 20 v9 c0 5 36 5 36 0 v-9" fill="none" stroke="#7a1622" stroke-width="3" />
              <line x1="62" y1="15" x2="62" y2="31" stroke="#c9a24b" stroke-width="2.6" stroke-linecap="round" />
              <circle cx="62" cy="33" r="3" fill="#c9a24b" />
            </svg>
          </span>
          <span class="title__grad">Graduation</span>
          <span class="title__cere">Ceremony</span>
        </h1>
      </section>

      <!-- ============ NAME ============ -->
      <section class="name-block">
        <p class="name">Nguyễn Thị Tường Vy</p>
      </section>

      <!-- ============ DATE / TIME ============ -->
      <section class="datetime" aria-label="Thời gian tổ chức">
        <div class="datetime__month-row">
          <span class="datetime__rule"></span>
          <span class="datetime__month">THURSDAY</span>
          <span class="datetime__rule"></span>
        </div>
        <div class="datetime__row">
          <span class="datetime__day">JULY</span>
          <!-- <span class="datetime__line"></span> -->
          <span class="datetime__num">23</span>
          <!-- <span class="datetime__line"></span> -->
          <span class="datetime__time">16:00</span>
        </div>
      </section>

      <!-- ============ LOCATION ============ -->
      <section class="location">
        <h2 class="location__heading">
          <svg class="location__pin" viewBox="0 0 24 24" width="15" height="15" aria-hidden="true">
            <path fill="currentColor" d="M12 2a7 7 0 0 0-7 7c0 5 7 13 7 13s7-8 7-13a7 7 0 0 0-7-7Zm0 9.5A2.5 2.5 0 1 1 12 6.5a2.5 2.5 0 0 1 0 5Z" />
          </svg>
          LOCATION
        </h2>
        <p class="location__name">University of Foreign Language Studies</p>
        <p class="location__name">The University of Danang</p>
        <p class="location__addr">131 Luong Nhu Hoc, Cam Le, Da Nang</p>

        <a
          class="btn-directions"
          href="https://www.google.com/maps/search/?api=1&query=%C4%90%E1%BA%A1i%20h%E1%BB%8Dc%20Ngo%E1%BA%A1i%20ng%E1%BB%AF%20-%20%C4%90%E1%BA%A1i%20h%E1%BB%8Dc%20%C4%90%C3%A0%20N%E1%BA%B5ng%20131%20L%C6%B0%C6%A1ng%20Nh%E1%BB%AF%20H%E1%BB%8Dc%20C%E1%BA%A9m%20L%E1%BB%87%20%C4%90%C3%A0%20N%E1%BA%B5ng"
          target="_blank"
          rel="noopener noreferrer"
        >
          <svg class="btn-directions__pin" viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
            <path fill="currentColor" d="M12 2a7 7 0 0 0-7 7c0 5 7 13 7 13s7-8 7-13a7 7 0 0 0-7-7Zm0 9.5A2.5 2.5 0 1 1 12 6.5a2.5 2.5 0 0 1 0 5Z" />
          </svg>
          <span>Get directions</span>
        </a>
      </section>
    </article>
  </main>
  <script src="script.js"></script>
</body>
</html>
